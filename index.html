<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gen 1 Encounter Map (Leaflet)</title>

    <!-- Favicon - prevents 404 error -->
    <link rel="icon" href="data:," />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Vega/Vega-Lite for visualizations -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@5.20.1"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="./src/styles.css" />
  </head>

  <body>
    <div id="app" class="sidebar-hidden">
      <!-- Sidebar -->
      <div id="sidebar">
        <!-- Menu Toggle Button (attached to sidebar) -->
        <button id="menu-toggle-btn" aria-label="Toggle menu">
          <svg id="hamburger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
          <svg id="close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <div id="sidebar-content">
          <h1 class="sidebar-title">Add Filter</h1>

          <!-- Pokemon Filter Section -->
          <div class="filter-section">
            <div class="filter-header" id="pokemon-header">
              <span>Pokémon</span>
              <span id="pokemon-arrow">▼</span>
            </div>
            <div class="filter-content" id="pokemon-content">
              <!-- Pokemon items will be populated here -->
            </div>
        </div>

          <!-- Location Filter Section -->
          <div class="filter-section">
            <div class="filter-header" id="location-header">
              <span>Location</span>
              <span id="location-arrow">▼</span>
            </div>
            <div class="filter-content" id="location-content">
              <!-- Location items will be populated here -->
            </div>
          </div>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <!-- Pokemon Details Modal -->
    <div id="pokemon-modal-overlay">
      <div id="pokemon-modal">
        <button id="modal-close-btn">&times;</button>
        <div class="modal-left-col">
          <img id="modal-image" class="modal-pokemon-image" src="" alt="Pokemon">
          <div id="modal-name" class="modal-pokemon-name">Pokemon</div>
          <div class="modal-stats-grid">
            <div class="modal-stat-item">
              <div class="modal-stat-label">Height: <span id="modal-height"></span></div>
            </div>
            <div class="modal-stat-item">
              <div class="modal-stat-label">Weight: <span id="modal-weight"></span></div>
            </div>
            <div class="modal-stat-item">
              <div class="modal-stat-label">Category: <span id="modal-category"></span></div>
            </div>
            <div class="modal-stat-item">
              <div class="modal-stat-label">Ability: <span id="modal-ability"></span></div>
            </div>
          </div>
        </div>
        <div class="modal-right-col">
          <div id="modal-range-graph"></div>
          <div id="modal-radar-chart" style="margin-top: 30px; display: flex; justify-content: center; width: 100%; height: 250px;"></div>
          <div id="modal-gender-chart" style="width: 100%; display: flex; justify-content: center; align-items: center; margin-top: 20px; margin-bottom: 20px;"></div>
        </div>
        <div id="modal-loading" class="modal-loading" style="display: none;">Loading...</div>
      </div>
    </div>

    <script src="./src/js/data.js"></script>
    <!-- Core modules -->
    <script src="./src/js/config.js"></script>
    <script src="./src/js/state.js"></script>
    <script src="./src/js/data-helpers.js"></script>
    <script src="./src/js/utils.js"></script>
    <!-- Feature modules -->
    <script src="./src/js/data-loader.js"></script>
    <script src="./src/js/map-init.js"></script>
    <script src="./src/js/location-areas.js"></script>
    <script src="./src/js/pokemon-display.js"></script>
    <script src="./src/js/filters.js"></script>
    <script src="./src/js/modal.js"></script>
    <script src="./src/js/sidebar.js"></script>
    <!-- Main entry point -->
    <script src="./src/js/app.js"></script>
  </body>
</html>
