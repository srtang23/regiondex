<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gen 1 Encounter Map (Leaflet)</title>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Your data -->
    <script src="./data.js"></script>

    <style>
      html, body { height: 100%; margin: 0; }
      #app { height: 100%; display: grid; grid-template-rows: auto 1fr; }
      #toolbar {
        display: flex; gap: 12px; align-items: center;
        padding: 10px 12px; border-bottom: 1px solid #e5e5e5;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      #map { height: 100%; position: relative; }
      select, input {
        padding: 6px 8px; border: 1px solid #ccc; border-radius: 8px;
        font-size: 14px;
      }
      .muted { color: #666; font-size: 13px; }

      #legend {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background: white;
        padding: 12px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        z-index: 1000;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 12px;
      }

      #legend h4 {
        margin: 0 0 8px 0;
        font-size: 13px;
        font-weight: 600;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }

      .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid;
      }

      /* High-quality image rendering - prevent blur on zoom */
      .high-quality-map {
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        -ms-interpolation-mode: nearest-neighbor;
      }

      /* Additional rendering improvements */
      .leaflet-image-layer {
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
      }

      /* Improve overall map container */
      .leaflet-container {
        image-rendering: -webkit-optimize-contrast;
      }

      /* For canvas elements if used */
      .leaflet-overlay-pane canvas {
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
      }

      /* Prevent blur during zoom transitions */
      .leaflet-zoom-animated {
        will-change: transform;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div id="toolbar">
        <div>
          <label for="pokemonSelect">Pokémon:</label>
          <select id="pokemonSelect"></select>
        </div>

        <div class="muted" id="summary"></div>

        <div style="margin-left: auto;">
          <button id="toggleLegend" style="padding: 6px 12px; border: 1px solid #ccc; border-radius: 8px; background: white; cursor: pointer; font-size: 14px;">
            Toggle Legend
          </button>
        </div>
      </div>

      <div id="map">
        <div id="legend">
          <h4>Location Types</h4>
          <div class="legend-item">
            <div class="legend-color" style="background: #44dd66; border-color: #22aa44;"></div>
            <span>Routes</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #aa7744; border-color: #885522;"></div>
            <span>Caves/Tunnels</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #aa66dd; border-color: #8844aa;"></div>
            <span>Towers</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #ffaa22; border-color: #dd8800;"></div>
            <span>Safari Zone</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #4488dd; border-color: #2266aa;"></div>
            <span>Water Areas</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #44aa66; border-color: #228844;"></div>
            <span>Forests</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #dd4466; border-color: #aa2244;"></div>
            <span>Buildings</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #ddaa44; border-color: #aa8822;"></div>
            <span>Victory Road</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      // --- 1) Configure your image map ---
      // Using full_kanto_map.png (7700x6400) for high quality zooming
      const IMAGE_WIDTH = 7700;
      const IMAGE_HEIGHT = 6400;

      // Leaflet uses [y, x] for "LatLng"-like pairs in CRS.Simple.
      // We'll store data as [x, y], then convert with toLatLng().
      const toLatLng = ([x, y]) => [y, x];

      const bounds = [
        [0, 0],
        [IMAGE_HEIGHT, IMAGE_WIDTH],
      ];

      const map = L.map("map", {
        crs: L.CRS.Simple,
        minZoom: -3,  // Allow zooming out more to see full image
        maxZoom: 5,  // Increased max zoom for better detail
        zoomControl: true,
        zoomSnap: 0.25,  // Smoother zoom increments
        zoomDelta: 0.5,  // Smoother zoom steps
        preferCanvas: true,  // Use canvas renderer for better performance
      });

      // Your Kanto map image with optimized rendering
      L.imageOverlay("./full_kanto_map.png", bounds, {
        opacity: 1,
        className: 'high-quality-map',
      }).addTo(map);

      // Function to create interactive location areas
      function createLocationArea(config) {
        const {
          id,
          bounds,
          label,
          borderColor = '#FFBD1D',
          fillColor = '#F4D995',
          borderWeight = 4,
          labelOffset = 40,
          labelPosition = 'right',
          zoomLevel = 3
        } = config;

        let isSelected = false;

        // Create rectangle
        const rectangle = L.rectangle(bounds, {
          color: borderColor,
          weight: 0,  // Hidden by default
          fillColor: fillColor,
          fillOpacity: 0,  // Hidden by default
          dashArray: '10, 5',
          className: 'location-area-highlight'
        }).addTo(map);

        // Show highlight on hover
        rectangle.on('mouseover', function() {
          this.setStyle({
            fillOpacity: 0.3,
            weight: borderWeight
          });
        });

        // Hide highlight when not hovering
        rectangle.on('mouseout', function() {
          if (isSelected) {
            // If selected, show only border (no fill)
            this.setStyle({
              fillOpacity: 0,
              weight: borderWeight
            });
          } else {
            // If not selected, hide everything
            this.setStyle({
              fillOpacity: 0,
              weight: 0
            });
          }
        });

        // Toggle selection on click
        rectangle.on('click', function() {
          if (!isSelected) {
            // Select: show only border, zoom in
            isSelected = true;
            this.setStyle({
              fillOpacity: 0,
              weight: borderWeight
            });
            map.flyToBounds(bounds, {
              padding: [50, 50],
              maxZoom: zoomLevel,
              duration: 1
            });
          } else {
            // Deselect: hide everything, zoom out to full map
            isSelected = false;
            this.setStyle({
              fillOpacity: 0,
              weight: 0
            });
            map.flyToBounds([[0, 0], [IMAGE_HEIGHT, IMAGE_WIDTH]], {
              padding: [0, 0],
              maxZoom: 1,
              duration: 1
            });
          }
        });

        // Calculate label position
        const centerY = (bounds[0][0] + bounds[1][0]) / 2;
        const centerX = (bounds[0][1] + bounds[1][1]) / 2;
        let labelLat, labelLng;

        if (labelPosition === 'right') {
          labelLat = centerY;
          labelLng = bounds[1][1] + labelOffset;
        } else if (labelPosition === 'left') {
          labelLat = centerY;
          labelLng = bounds[0][1] - labelOffset;
        } else if (labelPosition === 'top') {
          labelLat = bounds[0][0] - labelOffset;
          labelLng = centerX;
        } else if (labelPosition === 'bottom') {
          labelLat = bounds[1][0] + labelOffset;
          labelLng = centerX;
        }

        // Add label
        const areaLabel = L.marker([labelLat, labelLng], {
          icon: L.divIcon({
            className: 'area-label',
            html: `<div style="font-weight: bold; font-size: 14px; color: #000000; white-space: nowrap; cursor: pointer;">${label}</div>`,
            iconSize: [100, 25],
            iconAnchor: [0, 12.5]
          })
        }).addTo(map);

        // Make label also trigger hover and click
        areaLabel.on('mouseover', function() {
          rectangle.setStyle({
            fillOpacity: 0.3,
            weight: borderWeight
          });
        });

        areaLabel.on('mouseout', function() {
          if (isSelected) {
            // If selected, show only border (no fill)
            rectangle.setStyle({
              fillOpacity: 0,
              weight: borderWeight
            });
          } else {
            // If not selected, hide everything
            rectangle.setStyle({
              fillOpacity: 0,
              weight: 0
            });
          }
        });

        areaLabel.on('click', function() {
          if (!isSelected) {
            // Select: show only border, zoom in
            isSelected = true;
            rectangle.setStyle({
              fillOpacity: 0,
              weight: borderWeight
            });
            map.flyToBounds(bounds, {
              padding: [50, 50],
              maxZoom: zoomLevel,
              duration: 1
            });
          } else {
            // Deselect: hide everything, zoom out to full map
            isSelected = false;
            rectangle.setStyle({
              fillOpacity: 0,
              weight: 0
            });
            map.flyToBounds([[0, 0], [IMAGE_HEIGHT, IMAGE_WIDTH]], {
              padding: [0, 0],
              maxZoom: 1,
              duration: 1
            });
          }
        });

        return { rectangle, label: areaLabel };
      }

      // Define location areas
      // To add more areas, add objects to this array with the following properties:
      // - id: unique identifier (e.g., 'kanto-route-2-area')
      // - bounds: [[topLeftY, topLeftX], [bottomRightY, bottomRightX]]
      // - label: display name (e.g., 'Route 2')
      // - labelPosition: 'right', 'left', 'top', or 'bottom' (optional, default: 'right')
      // - labelOffset: distance from area in pixels (optional, default: 40)
      // - borderColor: hex color for border (optional, default: '#FFBD1D')
      // - fillColor: hex color for fill (optional, default: '#F4D995')
      // - borderWeight: thickness of border (optional, default: 4)
      // - zoomLevel: zoom level when clicked (optional, default: 3)
      const locationAreas = [
        {
          id: 'kanto-route-1-area',
          bounds: [[2240, 960], [2880, 1340]],
          label: 'Route 1',
          labelPosition: 'right',
          labelOffset: 40,
          zoomLevel: 3
        }
        // Example of adding another area:
        // {
        //   id: 'kanto-route-2-area',
        //   bounds: [[1500, 800], [2000, 1200]],
        //   label: 'Route 2',
        //   labelPosition: 'left',
        //   borderColor: '#FF5733',
        //   fillColor: '#FFC300'
        // }
      ];

      // Create all location areas
      locationAreas.forEach(area => createLocationArea(area));

      // Fit the entire image in the viewport
      map.fitBounds(bounds, {
        padding: [0, 0],  // No padding
        maxZoom: 1  // Don't zoom in too much initially
      });

      // Optional: Add grid overlay for debugging coordinates
      // Uncomment to see grid lines
      /*
      for (let x = 0; x <= IMAGE_WIDTH; x += 100) {
        L.polyline([[0, x], [IMAGE_HEIGHT, x]], {
          color: 'red',
          weight: 1,
          opacity: 0.3
        }).addTo(map);
      }
      for (let y = 0; y <= IMAGE_HEIGHT; y += 100) {
        L.polyline([[y, 0], [y, IMAGE_WIDTH]], {
          color: 'red',
          weight: 1,
          opacity: 0.3
        }).addTo(map);
      }
      */

      // --- 2) Build Pokémon list for the dropdown ---
      const allPokemon = new Set();
      for (const loc of window.ENCOUNTERS) {
        for (const e of loc.encounters) allPokemon.add(e.pokemon);
      }
      const pokemonList = ["(All)"].concat([...allPokemon].sort((a, b) => a.localeCompare(b)));

      const select = document.getElementById("pokemonSelect");
      for (const name of pokemonList) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      }

      const summary = document.getElementById("summary");

      // --- 3) Marker rendering + filtering ---
      const markersLayer = L.layerGroup().addTo(map);

      function popupHTML(location) {
        // Sort encounters high -> low for nice display
        const rows = [...location.encounters].sort((a, b) => b.rate - a.rate);
        return `
          <div style="min-width: 200px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;">
            <div style="font-weight: 700; margin-bottom: 6px;">${location.name}</div>
            <div style="font-size: 13px; color: #444; margin-bottom: 8px;">Wild encounters (sample)</div>
            <div style="font-size: 13px;">
              ${rows.map(r => `<div>${r.pokemon} — <b>${r.rate}%</b></div>`).join("")}
            </div>
          </div>
        `;
      }

      function locationHasPokemon(location, pokemonName) {
        if (pokemonName === "(All)") return true;
        return location.encounters.some(e => e.pokemon === pokemonName);
      }

      function render(pokemonName) {
        markersLayer.clearLayers();

        const visible = window.ENCOUNTERS.filter(loc => locationHasPokemon(loc, pokemonName));

        for (const loc of visible) {
          // Color code by location type
          let color = '#3388ff';
          let fillColor = '#3388ff';

          if (loc.name.includes('Route')) {
            color = '#22aa44';
            fillColor = '#44dd66';
          } else if (loc.name.includes('Cave') || loc.name.includes('Tunnel')) {
            color = '#885522';
            fillColor = '#aa7744';
          } else if (loc.name.includes('Tower')) {
            color = '#8844aa';
            fillColor = '#aa66dd';
          } else if (loc.name.includes('Safari')) {
            color = '#dd8800';
            fillColor = '#ffaa22';
          } else if (loc.name.includes('Seafoam') || loc.name.includes('Sea Route')) {
            color = '#2266aa';
            fillColor = '#4488dd';
          } else if (loc.name.includes('Forest')) {
            color = '#228844';
            fillColor = '#44aa66';
          } else if (loc.name.includes('Mansion') || loc.name.includes('Power Plant')) {
            color = '#aa2244';
            fillColor = '#dd4466';
          } else if (loc.name.includes('Victory Road')) {
            color = '#aa8822';
            fillColor = '#ddaa44';
          }

          const marker = L.circleMarker(toLatLng(loc.xy), {
            radius: 8,
            weight: 2,
            color: color,
            fillColor: fillColor,
            fillOpacity: 0.7,
          });

          marker.bindTooltip(loc.name, { direction: "top", offset: [0, -6] });
          marker.bindPopup(popupHTML(loc));
          marker.addTo(markersLayer);
        }

        summary.textContent =
          pokemonName === "(All)"
            ? `${visible.length} locations shown`
            : `${visible.length} locations with ${pokemonName}`;
      }

      select.addEventListener("change", () => render(select.value));

      // Toggle legend visibility
      const toggleLegendBtn = document.getElementById("toggleLegend");
      const legend = document.getElementById("legend");
      let legendVisible = true;

      toggleLegendBtn.addEventListener("click", () => {
        legendVisible = !legendVisible;
        legend.style.display = legendVisible ? "block" : "none";
      });

      // Initial render
      render("(All)");

      // Log some statistics
      console.log(`Loaded ${window.ENCOUNTERS.length} locations`);
      console.log(`Total Pokémon species: ${allPokemon.size}`);

      // Count location types
      const locationTypes = {};
      window.ENCOUNTERS.forEach(loc => {
        let type = 'Other';
        if (loc.name.includes('Route')) type = 'Route';
        else if (loc.name.includes('Cave') || loc.name.includes('Tunnel')) type = 'Cave/Tunnel';
        else if (loc.name.includes('Tower')) type = 'Tower';
        else if (loc.name.includes('Safari')) type = 'Safari Zone';
        else if (loc.name.includes('Seafoam') || loc.name.includes('Sea Route')) type = 'Water Area';
        else if (loc.name.includes('Forest')) type = 'Forest';
        else if (loc.name.includes('Mansion') || loc.name.includes('Power Plant')) type = 'Building';
        else if (loc.name.includes('Victory Road')) type = 'Victory Road';

        locationTypes[type] = (locationTypes[type] || 0) + 1;
      });

      console.log('Location breakdown:', locationTypes);
    </script>
  </body>
</html>
