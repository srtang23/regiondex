<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coordinate Helper - Click to Get Coordinates</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      html, body { height: 100%; margin: 0; }
      #app { height: 100%; display: grid; grid-template-rows: auto 1fr; }
      #toolbar {
        display: flex; gap: 12px; align-items: center;
        padding: 10px 12px; border-bottom: 1px solid #e5e5e5;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      #map { height: 100%; }
      #coords {
        font-weight: bold;
        color: #2563eb;
      }
      .info {
        color: #666;
        font-size: 13px;
      }

      /* High-quality image rendering */
      .leaflet-image-layer {
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
      }

      .leaflet-container {
        image-rendering: -webkit-optimize-contrast;
      }

      /* Smooth transitions for location area highlights */
      .location-area-highlight {
        transition: fill-opacity 0.15s ease-out, stroke-width 0.15s ease-out, stroke-opacity 0.15s ease-out;
      }

      /* Make text labels non-interactive - allow mouse events to pass through */
      .area-label {
        pointer-events: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <span class="info">Click on the map to get coordinates:</span>
        <span id="coords">[x, y]</span>
      </div>
      <div id="map"></div>
    </div>

    <script>
      const IMAGE_WIDTH = 7700;
      const IMAGE_HEIGHT = 6400;

      const toLatLng = ([x, y]) => [y, x];
      const fromLatLng = (latlng) => [Math.round(latlng.lng), Math.round(latlng.lat)];

      const bounds = [[0, 0], [IMAGE_HEIGHT, IMAGE_WIDTH]];

      const map = L.map("map", {
        crs: L.CRS.Simple,
        minZoom: -3,  // Allow zooming out to see full image
        maxZoom: 5,   // Allow zooming in for detail
        zoomControl: true,
        zoomSnap: 0.5,  // Larger zoom increments for easier manual zooming
        zoomDelta: 1,   // Larger zoom steps (double click, scroll wheel)
      });

      L.imageOverlay("./full_kanto_map.png", bounds, {
        className: 'high-quality-image'
      }).addTo(map);

      // Track currently selected area globally
      let currentlySelectedArea = null;

      // Function to create interactive location areas
      function createLocationArea(config) {
        const {
          id,
          bounds,
          label,
          borderColor = '#FFBD1D',
          fillColor = '#F4D995',
          borderWeight = 5,
          labelOffset = 30,
          labelPosition = 'right',
          labelFontSize = 16,
          zoomLevel = 4
        } = config;

        let isSelected = false;

        // Create rectangle
        const rectangle = L.rectangle(bounds, {
          color: borderColor,
          weight: 0,  // Hidden by default
          fillColor: fillColor,
          fillOpacity: 0,  // Hidden by default
          dashArray: '10, 5',
          className: 'location-area-highlight'
        }).addTo(map);

        // Show highlight on hover
        rectangle.on('mouseover', function() {
          this.setStyle({
            fillOpacity: 0.3,
            weight: borderWeight
          });
          updateLabelStyle(true, isSelected);
        });

        // Hide highlight when not hovering
        rectangle.on('mouseout', function() {
          if (isSelected) {
            // If selected, show only border (no fill)
            this.setStyle({
              fillOpacity: 0,
              weight: borderWeight
            });
            updateLabelStyle(false, true);
          } else {
            // If not selected, hide everything
            this.setStyle({
              fillOpacity: 0,
              weight: 0
            });
            updateLabelStyle(false, false);
          }
        });

        // Toggle selection on click
        rectangle.on('click', function() {
          if (!isSelected) {
            // Deselect previously selected area if any
            if (currentlySelectedArea && currentlySelectedArea !== rectangle) {
              currentlySelectedArea.deselect();
            }

            // Select: show only border, zoom in
            isSelected = true;
            currentlySelectedArea = rectangle;
            this.setStyle({
              fillOpacity: 0,
              weight: borderWeight
            });
            updateLabelStyle(false, true);
            map.flyToBounds(bounds, {
              padding: [50, 50],
              maxZoom: zoomLevel,
              duration: 1
            });
          } else {
            // Deselect: hide everything, zoom out to full map
            isSelected = false;
            currentlySelectedArea = null;
            this.setStyle({
              fillOpacity: 0,
              weight: 0
            });
            updateLabelStyle(false, false);
            map.flyToBounds([[0, 0], [IMAGE_HEIGHT, IMAGE_WIDTH]], {
              padding: [0, 0],
              maxZoom: 1,
              duration: 1
            });
          }
        });

        // Calculate label position
        // bounds format: [[minX, minY], [maxX, maxY]]
        // where minX=left, maxX=right, minY=bottom, maxY=top
        const centerX = (bounds[0][0] + bounds[1][0]) / 2;
        const centerY = (bounds[0][1] + bounds[1][1]) / 2;
        let labelLng, labelLat;  // Leaflet uses [lat, lng] which is [Y, X]

        // Get custom offsets if provided
        const customOffsetX = config.labelOffsetX || 0;
        const customOffsetY = config.labelOffsetY || 0;

        // Position labels on the specified side, centered along that edge
        // Note: In your coordinate system, larger Y = higher on screen (top), smaller Y = lower on screen (bottom)
        if (labelPosition === 'right') {
          labelLng = bounds[1][0] + labelOffset + customOffsetX;  // maxX + offset (move right)
          labelLat = centerY + customOffsetY;
        } else if (labelPosition === 'left') {
          labelLng = bounds[0][0] - labelOffset + customOffsetX;  // minX - offset (move left)
          labelLat = centerY + customOffsetY;
        } else if (labelPosition === 'top') {
          // Top = higher Y value, so ADD offset to move label higher
          labelLng = centerX + customOffsetX;
          labelLat = bounds[1][1] + labelOffset + customOffsetY;  // maxY + offset (move up)
        } else if (labelPosition === 'bottom') {
          // Bottom = lower Y value, so SUBTRACT offset to move label lower
          labelLng = centerX + customOffsetX;
          labelLat = bounds[0][1] - labelOffset + customOffsetY;  // minY - offset (move down)
        } else {
          // Default to right if no position specified
          labelLng = bounds[1][0] + labelOffset + customOffsetX;
          labelLat = centerY + customOffsetY;
        }

        // Add label with dynamic sizing
        const baseFontSize = labelFontSize || 20;  // Base font size at zoom level 1

        const labelDiv = document.createElement('div');
        labelDiv.style.cssText = `
          font-weight: bold;
          font-size: ${baseFontSize}px;
          color: #000000;
          white-space: nowrap;
          cursor: default;
          transition: color 0.15s ease-out;
          text-align: center;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100%;
          pointer-events: none;
        `;
        labelDiv.textContent = label;

        // Function to calculate anchor based on zoom and text width
        function calculateAnchor(zoom) {
          const fontSize = baseFontSize * Math.pow(1.4, zoom - 1);
          // Estimate text width: roughly 0.7 * fontSize per character (bold text is wider)
          const estimatedTextWidth = label.length * fontSize * 0.7;

          let anchorX;
          let anchorY = 30;  // Y is always centered (for left/right positions)

          if (labelPosition === 'left') {
            // Coordinate is LEFT of the area (at minX - offset), text should extend LEFT from coordinate
            // Anchor at the right edge based on estimated text width
            anchorX = Math.min(estimatedTextWidth + 10, 300);  // Anchor at text width + padding, cap at iconSize
          } else if (labelPosition === 'right') {
            // Coordinate is RIGHT of the area (at maxX + offset), text should extend RIGHT from coordinate
            // So anchor at LEFT edge of text, text extends right
            anchorX = 0;  // Anchor at left edge
          } else if (labelPosition === 'top') {
            anchorX = 150;  // Center horizontally
            anchorY = 60;   // Anchor at bottom
          } else {  // bottom
            anchorX = 150;  // Center horizontally
            anchorY = 0;    // Anchor at top
          }

          return [anchorX, anchorY];
        }

        // Calculate initial anchor
        const initialAnchor = calculateAnchor(map.getZoom());

        // Create marker with calculated initial anchor
        const areaLabel = L.marker([labelLat, labelLng], {
          icon: L.divIcon({
            className: 'area-label',
            html: labelDiv.outerHTML,
            iconSize: [300, 60],
            iconAnchor: initialAnchor
          })
        }).addTo(map);

        // Function to update label font size and anchor based on zoom
        function updateLabelSize() {
          const labelElement = areaLabel.getElement()?.querySelector('div');
          if (labelElement) {
            const zoom = map.getZoom();
            const fontSize = baseFontSize * Math.pow(1.4, zoom - 1);
            labelElement.style.fontSize = `${fontSize}px`;

            // Update the icon anchor
            const newAnchor = calculateAnchor(zoom);
            const icon = areaLabel.getIcon();
            icon.options.iconAnchor = newAnchor;
            areaLabel.setIcon(icon);

            // Reapply color after setIcon (which recreates the element)
            updateLabelStyle(false, isSelected);
          }
        }

        // Function to update label style (color only)
        function updateLabelStyle(isHovering, isAreaSelected) {
          const labelElement = areaLabel.getElement()?.querySelector('div');
          if (labelElement) {
            if (isHovering) {
              labelElement.style.color = '#FFBD1D';
            } else if (isAreaSelected) {
              labelElement.style.color = '#FFBD1D';
            } else {
              labelElement.style.color = '#000000';
            }
            // Don't modify font size here - it's handled by updateLabelSize
          }
        }

        // Update size on zoom
        map.on('zoomend', updateLabelSize);

        // Set initial size after a short delay to ensure element is rendered
        setTimeout(updateLabelSize, 100);

        // Add deselect method to rectangle
        rectangle.deselect = function() {
          isSelected = false;
          this.setStyle({
            fillOpacity: 0,
            weight: 0
          });
          updateLabelStyle(false, false);
        };

        return { rectangle, label: areaLabel };
      }

      // Define location areas
      // To add more areas, add objects to this array with the following properties:
      // - id: unique identifier (e.g., 'kanto-route-2-area')
      // - bounds: [[topLeftY, topLeftX], [bottomRightY, bottomRightX]]
      // - label: display name (e.g., 'Route 2')
      // - labelPosition: 'right', 'left', 'top', or 'bottom' (optional, default: 'right')
      // - labelOffset: distance from area in pixels (optional, default: 50)
      // - labelFontSize: font size in pixels (optional, default: 16)
      // - borderColor: hex color for border (optional, default: '#FFBD1D')
      // - fillColor: hex color for fill (optional, default: '#F4D995')
      // - borderWeight: thickness of border (optional, default: 5)
      // - zoomLevel: zoom level when clicked (optional, default: 4)
      const locationAreas = [
        {
          id: 'kanto-route-1-area',
          bounds: [[2240, 960], [2880, 1340]],
          label: 'Route 1',
          labelPosition: 'right',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-10-area',
          bounds: [[4325, 6145], [5600, 6525]],
          label: 'Route 10',
          labelPosition: 'right',
          labelOffsetY: 1653,  // Move label down (bigger Y) to avoid map overlap
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-11-area',
          bounds: [[2720, 4990], [3040, 6145]],
          label: 'Route 11',
          labelPosition: 'bottom',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-12-area',
          bounds: [[2080, 6145], [4000, 6525]],
          label: 'Route 12',
          labelPosition: 'right',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-13-area',
          bounds: [[1760, 5375], [2080, 6525]],
          label: 'Route 13',
          labelPosition: 'right',
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-14-area',
          bounds: [[1120, 4990], [2080, 5375]],
          label: 'Route 14',
          labelPosition: 'right',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-15-area',
          bounds: [[1120, 3840], [1440, 4990]],
          label: 'Route 15',
          labelPosition: 'bottom',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-16-area',
          bounds: [[4000, 2115], [4320, 2880]],
          label: 'Route 16',
          labelCoords: [2376, 4432],  // Custom position [X, Y]
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-17-area',
          bounds: [[1440, 2115], [4000, 2495]],
          label: 'Route 17',
          labelPosition: 'right',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-18-area',
          bounds: [[1120, 2115], [1440, 3070]],
          label: 'Route 18',
          labelPosition: 'bottom',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-2-south-towards-viridian-city',
          bounds: [[3520, 960], [4800, 1340]],
          label: 'Route 2',
          labelPosition: 'right',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-22-area',
          bounds: [[2980, 0], [3360, 770]],
          label: 'Route 22',
          labelPosition: 'left',
          labelOffsetX: 100,  // Move further left
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-23-area',
          bounds: [[3360, 0], [6240, 380]],
          label: 'Route 23',
          labelPosition: 'left',
          labelOffsetX: 100,  // Move further left
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-24-area',
          bounds: [[5760, 4420], [6400, 4800]],
          label: 'Route 24',
          labelPosition: 'right',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-25-area',
          bounds: [[6080, 4800], [6400, 5950]],
          label: 'Route 25',
          labelPosition: 'bottom',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-5-area',
          bounds: [[4480, 4220], [5280, 5000]],
          label: 'Route 5',
          labelPosition: 'left',
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-6-area',
          bounds: [[3200, 4420], [3840, 4800]],
          label: 'Route 6',
          labelPosition: 'right',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-7-area',
          bounds: [[4000, 3840], [4320, 4220]],
          label: 'Route 7',
          labelPosition: 'top',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-8-area',
          bounds: [[4000, 4930], [4320, 6140]],
          label: 'Route 8',
          labelPosition: 'top',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        },
        {
          id: 'kanto-route-9-area',
          bounds: [[5280, 5000], [5600, 6140]],
          label: 'Route 9',
          labelPosition: 'bottom',
          labelOffset: 50,
          labelFontSize: 16,
          zoomLevel: 4
        }
      ];

      // Create all location areas
      locationAreas.forEach(area => createLocationArea(area));

      // Fit the entire image in the viewport
      map.fitBounds(bounds, {
        padding: [0, 0],
        maxZoom: 1  // Show full image initially
      });

      // Add grid overlay with multiple levels for better reference
      const majorGridSpacing = 500;   // Major grid lines every 500px
      const minorGridSpacing = 50;    // Minor grid lines every 50px (more dense)
      const labelSpacing = 500;       // Show labels every 500 pixels

      // Minor grid lines (thin, more transparent)
      for (let x = 0; x <= IMAGE_WIDTH; x += minorGridSpacing) {
        const isMajor = x % majorGridSpacing === 0;
        L.polyline([[0, x], [IMAGE_HEIGHT, x]], {
          color: isMajor ? 'red' : '#ff9999',
          weight: isMajor ? 2 : 1,
          opacity: isMajor ? 0.4 : 0.15
        }).addTo(map);

        // Add labels to major lines
        if (x % labelSpacing === 0) {
          // Top label
          L.marker([100, x], {
            icon: L.divIcon({
              className: 'grid-label',
              html: `<div style="color: red; font-weight: bold; font-size: 12px; background: rgba(255,255,255,0.9); padding: 2px 6px; border-radius: 3px; border: 1px solid red;">${x}</div>`,
              iconSize: [60, 20]
            })
          }).addTo(map);

          // Bottom label
          L.marker([IMAGE_HEIGHT - 100, x], {
            icon: L.divIcon({
              className: 'grid-label',
              html: `<div style="color: red; font-weight: bold; font-size: 12px; background: rgba(255,255,255,0.9); padding: 2px 6px; border-radius: 3px; border: 1px solid red;">${x}</div>`,
              iconSize: [60, 20]
            })
          }).addTo(map);
        }
      }

      for (let y = 0; y <= IMAGE_HEIGHT; y += minorGridSpacing) {
        const isMajor = y % majorGridSpacing === 0;
        L.polyline([[y, 0], [y, IMAGE_WIDTH]], {
          color: isMajor ? 'red' : '#ff9999',
          weight: isMajor ? 2 : 1,
          opacity: isMajor ? 0.4 : 0.15
        }).addTo(map);

        // Add labels to major lines
        if (y % labelSpacing === 0) {
          // Left label
          L.marker([y, 100], {
            icon: L.divIcon({
              className: 'grid-label',
              html: `<div style="color: red; font-weight: bold; font-size: 12px; background: rgba(255,255,255,0.9); padding: 2px 6px; border-radius: 3px; border: 1px solid red;">${y}</div>`,
              iconSize: [60, 20]
            })
          }).addTo(map);

          // Right label
          L.marker([y, IMAGE_WIDTH - 100], {
            icon: L.divIcon({
              className: 'grid-label',
              html: `<div style="color: red; font-weight: bold; font-size: 12px; background: rgba(255,255,255,0.9); padding: 2px 6px; border-radius: 3px; border: 1px solid red;">${y}</div>`,
              iconSize: [60, 20]
            })
          }).addTo(map);
        }
      }

      const coordsDisplay = document.getElementById('coords');
      let currentMarker = null;

      map.on('click', (e) => {
        const coords = fromLatLng(e.latlng);
        coordsDisplay.textContent = `[${coords[0]}, ${coords[1]}]`;

        // Remove previous marker
        if (currentMarker) {
          map.removeLayer(currentMarker);
        }

        // Add new marker
        currentMarker = L.circleMarker(e.latlng, {
          radius: 8,
          weight: 2,
          color: '#ff0000',
          fillColor: '#ff6666',
          fillOpacity: 0.7,
        }).addTo(map);

        console.log(`Clicked at: [${coords[0]}, ${coords[1]}]`);
      });
    </script>
  </body>
</html>
